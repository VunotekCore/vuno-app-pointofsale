name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: VUNO-POS-win
          - os: ubuntu-latest
            target: linux
            artifact: VUNO-POS-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build Electron (Windows)
        if: matrix.target == 'win'
        run: cd frontend && pnpm electron:build:prod:win --publish never

      - name: Build Electron (Linux)
        if: matrix.target == 'linux'
        run: cd frontend && pnpm electron:build:prod:linux --publish never

      - name: Find and upload artifacts (Windows)
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/release/*.exe
          retention-days: 5

      - name: Find and upload artifacts (Linux)
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/release/*.AppImage
          retention-days: 5

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VUNO-POS-win
          path: release-win

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: VUNO-POS-linux
          path: release-linux

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-win/*.exe
          asset_name: VUNO-POS-${{ github.ref_name }}-Setup.exe
          asset_content_type: application/x-msdownload

      - name: Upload Linux Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-linux/*.AppImage
          asset_name: VUNO-POS-${{ github.ref_name }}.AppImage
          asset_content_type: application/octet-stream